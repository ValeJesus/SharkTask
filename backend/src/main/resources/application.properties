# Nome da aplicação (aparece nos logs)
spring.application.name=sharktask-backend

# Porta em que o servidor vai rodar. A API ficará em http://localhost:8080
server.port=8080

# ---- Banco de dados H2 (em memória) ----
# "mem:sharktaskdb" significa que o banco vive na MEMÓRIA do computador
# enquanto o programa está rodando. Ótimo pra aprender, mas os dados
# somem toda vez que você para o servidor (php artisan serve não tem
# esse problema porque o SQLite é um arquivo em disco ? aqui é diferente
# de propósito, pra você não precisar instalar nada agora).
spring.datasource.url=jdbc:h2:mem:sharktaskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialeto do Hibernate específico pro H2 (cada banco tem pequenas
# diferenças de SQL, o Hibernate precisa saber qual "sotaque" usar)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# "update": o Hibernate cria/atualiza as tabelas automaticamente com
# base nas classes @Entity, toda vez que o servidor sobe. Não precisamos
# escrever migrations manualmente, ao contrário do Laravel.
spring.jpa.hibernate.ddl-auto=update

# Mostra no console as queries SQL que o Hibernate está executando ?
# ótimo pra aprender o que está acontecendo por trás dos panos.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Habilita um painel visual no navegador pra você ver as tabelas e os
# dados do banco H2 ao vivo, em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
