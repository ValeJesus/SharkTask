# Nome da aplicaï¿½ï¿½o (aparece nos logs)
spring.application.name=sharktask-backend

# Porta em que o servidor vai rodar. A API ficarï¿½ em http://localhost:8080
server.port=8080

# ---- Banco de dados H2 (em memï¿½ria) ----
# "mem:sharktaskdb" significa que o banco vive na MEMï¿½RIA do computador
# enquanto o programa estï¿½ rodando. ï¿½timo pra aprender, mas os dados
# somem toda vez que vocï¿½ para o servidor (php artisan serve nï¿½o tem
# esse problema porque o SQLite ï¿½ um arquivo em disco ? aqui ï¿½ diferente
# de propï¿½sito, pra vocï¿½ nï¿½o precisar instalar nada agora).
spring.datasource.url=jdbc:h2:mem:sharktaskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialeto do Hibernate especï¿½fico pro H2 (cada banco tem pequenas
# diferenï¿½as de SQL, o Hibernate precisa saber qual "sotaque" usar)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# "update": o Hibernate cria/atualiza as tabelas automaticamente com
# base nas classes @Entity, toda vez que o servidor sobe. Nï¿½o precisamos
# escrever migrations manualmente, ao contrï¿½rio do Laravel.
spring.jpa.hibernate.ddl-auto=update

# Mostra no console as queries SQL que o Hibernate estï¿½ executando ?
# ï¿½timo pra aprender o que estï¿½ acontecendo por trï¿½s dos panos.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Habilita um painel visual no navegador pra vocï¿½ ver as tabelas e os
# dados do banco H2 ao vivo, em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
